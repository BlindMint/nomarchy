# =============================================================================
# NOMARCHY — HYPRLAND CONFIGURATION
# https://wiki.hyprland.org/Configuring/
# =============================================================================


# =============================================================================
# MONITORS
# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors: hyprctl monitors
# Format: monitor = [port], resolution, position, scale
# =============================================================================

# Optimized for retina-class 2x displays (13" 2.8K, 27" 5K, 32" 6K)
env = GDK_SCALE,2
monitor=,preferred,auto,auto

# Good compromise for 27" or 32" 4K monitors (fractional)
# env = GDK_SCALE,1.75
# monitor=,preferred,auto,1.6

# 1x setup for 1080p / 1440p / ultrawide
# env = GDK_SCALE,1
# monitor=,preferred,auto,1

# Portrait/rotated monitor (transform: 1 = 90°, 3 = 270°)
# monitor = DP-2, preferred, auto, 1, transform, 1


# =============================================================================
# ENVIRONMENT VARIABLES
# =============================================================================

# Cursor size
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Force all apps to use Wayland
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_STYLE_OVERRIDE,kvantum
env = SDL_VIDEODRIVER,wayland,x11
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = OZONE_PLATFORM,wayland
env = XDG_SESSION_TYPE,wayland

# Better screen sharing support (Google Meet, Discord, etc.)
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland

xwayland {
    force_zero_scaling = true
}

# Use XCompose file
env = XCOMPOSEFILE,~/.XCompose

# Suppress Hyprland update news on launch
ecosystem {
    no_update_news = true
}

# Style gum confirm prompts to match terminal theme
env = GUM_CONFIRM_PROMPT_FOREGROUND,6       # Cyan
env = GUM_CONFIRM_SELECTED_FOREGROUND,0     # Black
env = GUM_CONFIRM_SELECTED_BACKGROUND,2     # Green
env = GUM_CONFIRM_UNSELECTED_FOREGROUND,7   # White
env = GUM_CONFIRM_UNSELECTED_BACKGROUND,8   # Dark grey


# =============================================================================
# AUTOSTART
# =============================================================================

exec-once = uwsm-app -- hypridle
exec-once = uwsm-app -- mako
exec-once = uwsm-app -- waybar
exec-once = uwsm-app -- fcitx5 --disable notificationitem
exec-once = uwsm-app -- swaybg -i ~/.config/nomarchy/current/background -m fill
exec-once = uwsm-app -- swayosd-server
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Slow app launch fix — export systemd environment
exec-once = systemctl --user import-environment $(env | cut -d'=' -f 1)
exec-once = dbus-update-activation-environment --systemd --all

# Add extra autostart processes below:
# exec-once = uwsm-app -- my-service


# =============================================================================
# INPUT
# See https://wiki.hyprland.org/Configuring/Variables/#input
# =============================================================================

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = compose:caps
    kb_rules =

    follow_mouse = 1
    sensitivity = 0  # -1.0 to 1.0, 0 = no modification

    # Change speed of keyboard repeat
    repeat_rate = 40
    repeat_delay = 600

    # Start with numlock on by default
    numlock_by_default = true

    # Uncomment to enable mouse acceleration
    # force_no_accel = true

    touchpad {
        natural_scroll = false

        # Use two-finger clicks for right-click instead of lower-right corner
        # clickfinger_behavior = true

        # Control the speed of your scrolling
        scroll_factor = 0.4

        # Enable the touchpad while typing
        # disable_while_typing = false

        # Left-click-and-drag with three fingers
        # drag_3fg = 1
    }
}

# Wake display on key press / mouse move
misc {
    key_press_enables_dpms  = true
    mouse_move_enables_dpms = true
}

# Touchpad scroll speed per terminal
windowrule {
    match:class = (Alacritty|kitty)
    scroll_touchpad = 1.5
}

windowrule {
    match:class = com.mitchellh.ghostty
    scroll_touchpad = 0.2
}

# Touchpad gesture for workspace switching (optional)
# gesture = 3, horizontal, workspace


# =============================================================================
# LOOK & FEEL
# See https://wiki.hyprland.org/Configuring/Variables/
# =============================================================================

# Default border color variables (overridden by active theme below)
$activeBorderColor   = rgba(33ccffee) rgba(00ff99ee) 45deg
$inactiveBorderColor = rgba(595959aa)

general {
    gaps_in  = 5
    gaps_out = 10
    border_size = 2

    col.active_border   = $activeBorderColor
    col.inactive_border = $inactiveBorderColor

    resize_on_border = false
    allow_tearing    = false
    layout = dwindle

    # No gaps / borders:
    # gaps_in = 0
    # gaps_out = 0
    # border_size = 0

    # Side-scrolling (niri-like) layout:
    # layout = scrolling
}

decoration {
    rounding = 0

    # Rounded corners:
    # rounding = 8

    shadow {
        enabled     = true
        range       = 2
        render_power = 3
        color       = rgba(1a1a1aee)
    }

    blur {
        enabled    = true
        size       = 2
        passes     = 2
        special    = true
        brightness = 0.60
        contrast   = 0.75
    }

    # Dim unfocused windows:
    # dim_inactive = true
    # dim_strength = 0.15
}

group {
    col.border_active          = $activeBorderColor
    col.border_inactive        = $inactiveBorderColor
    col.border_locked_active   = -1
    col.border_locked_inactive = -1

    groupbar {
        font_size            = 12
        font_family          = monospace
        font_weight_active   = ultraheavy
        font_weight_inactive = normal
        indicator_height     = 0
        indicator_gap        = 5
        height               = 22
        gaps_in              = 5
        gaps_out             = 0
        text_color           = rgb(ffffff)
        text_color_inactive  = rgba(ffffff90)
        col.active           = rgba(00000040)
        col.inactive         = rgba(00000020)
        gradients            = true
        gradient_rounding    = 0
        gradient_round_only_edges = false
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global,          1, 10,  default
    animation = border,          1, 5.39, easeOutQuint
    animation = windows,         1, 4.79, easeOutQuint
    animation = windowsIn,       1, 4.1,  easeOutQuint, popin 87%
    animation = windowsOut,      1, 1.49, linear,       popin 87%
    animation = fadeIn,          1, 1.73, almostLinear
    animation = fadeOut,         1, 1.46, almostLinear
    animation = fade,            1, 3.03, quick
    animation = layers,          1, 3.81, easeOutQuint
    animation = layersIn,        1, 4,    easeOutQuint, fade
    animation = layersOut,       1, 1.5,  linear,       fade
    animation = fadeLayersIn,    1, 1.79, almostLinear
    animation = fadeLayersOut,   1, 1.39, almostLinear
    animation = workspaces,      0, 0,    ease
    animation = specialWorkspace,1, 4,    easeOutQuint, slidevert

    # Disable all animations:
    # enabled = no
}

dwindle {
    pseudotile    = true
    preserve_split = true
    force_split   = 2  # Always split to the right
}

master {
    new_status = master
}

misc {
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    focus_on_activate        = true
    anr_missed_pings         = 3
    on_focus_under_fullscreen = 1
}

cursor {
    hide_on_key_press       = true
    warp_on_change_workspace = 1
}

binds {
    hide_special_on_workspace_change = true
}

layout {
    # Avoid overly wide single-window layouts on wide screens:
    # single_window_aspect_ratio = 1 1
}


# =============================================================================
# WINDOW RULES
# =============================================================================

# Screensaver (base rules)
windowrule {
    name = screensaver-base
    match:class = ^org.nomarchy.screensaver$

    float = on
    fullscreen = on
    border_size = 0
    animation = off
    pin = on
    stayfocused = on
}

# Floating system UI (Nautilus, portals, Calculator, pavucontrol, blueman)
windowrule {
    name = floating-system-ui
    match:class = ^(org.gnome.Nautilus|org.freedesktop.impl.portal.desktop.gtk|org.freedesktop.impl.portal.desktop.hyprland|org.gnome.Calculator|pavucontrol|blueman-manager)$

    float = on
    border_size = 0
    size = 40% 40%
    center = on
    opacity = 0.95
}

# =============================================================================
# THEME  (loaded after look & feel so theme colors override defaults)
# This file is managed by nomarchy-theme-set — do not edit manually.
# =============================================================================

source = ~/.config/nomarchy/current/theme/hyprland.conf


# =============================================================================
# WINDOW RULES — BASE
# See https://wiki.hyprland.org/Configuring/Window-Rules/
# =============================================================================

# Suppress maximize events from apps
windowrule {
    name = suppress-maximize
    match:class = .*

    suppress_event = maximize
}

# Tag all windows for default opacity (apps can override below)
windowrule {
    name = tag-default-opacity
    match:class = .*

    tag = +default-opacity
}

# Fix dragging issues with XWayland
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = on
}

# Apply default opacity (after app-specific rules have had a chance to opt out)
windowrule {
    name = apply-default-opacity
    match:tag = default-opacity

    opacity = 0.97 0.9
}


# =============================================================================
# WINDOW RULES — APP-SPECIFIC
# =============================================================================

# --- Floating system windows ---
windowrule {
    name = tag-floating-apps
    match:class = (org.nomarchy.bluetui|org.nomarchy.impala|org.nomarchy.wiremix|org.nomarchy.btop|org.nomarchy.terminal|org.nomarchy.bash|org.gnome.NautilusPreviewer|org.gnome.Evince|com.gabm.satty|Nomarchy|About|TUI.float|imv|mpv)

    tag = +floating-window
}

windowrule {
    name = tag-floating-dialogs
    match:class = (xdg-desktop-portal-gtk|sublime_text|DesktopEditors|org.gnome.Nautilus)
    match:title = ^(Open.*Files?|Open [F|f]older.*|Save.*Files?|Save.*As|Save|All Files|.*wants to [open|save].*|[C|c]hoose.*)

    tag = +floating-window
}

windowrule {
    name = floating-window-props
    match:tag = floating-window

    float = on
    center = on
    size = 875 600
}

windowrule {
    name = float-calculator
    match:class = org.gnome.Calculator

    float = on
}

# Screensaver
windowrule {
    name = screensaver
    match:class = org.nomarchy.screensaver

    fullscreen = on
    float = on
    animation = slide
}

# No transparency on media windows
windowrule {
    name = media-opaque
    match:class = ^(zoom|vlc|mpv|org.kde.kdenlive|com.obsproject.Studio|com.github.PintaProject.Pinta|imv|org.gnome.NautilusPreviewer)$

    tag = -default-opacity
    opacity = 1 1
}

# Popped window rounding
windowrule {
    name = pop-rounding
    match:tag = pop

    rounding = 8
}

# Prevent idle while tagged
windowrule {
    name = noidle
    match:tag = noidle

    idle_inhibit = always
}

# --- Password managers ---
windowrule {
    name = 1password
    match:class = ^(1[p|P]assword)$

    no_screen_share = on
    tag = +floating-window
}

windowrule {
    name = bitwarden
    match:class = ^(Bitwarden)$

    no_screen_share = on
    tag = +floating-window
}

windowrule {
    name = bitwarden-chrome-ext
    match:class = chrome-nngceckbapebfimnlniiiahkandclblb-Default

    no_screen_share = on
    tag = +floating-window
}

# --- Browsers ---
windowrule {
    name = tag-chromium
    match:class = ((google-)?[cC]hrom(e|ium)|[bB]rave-browser|[mM]icrosoft-edge|Vivaldi-stable|helium)

    tag = +chromium-based-browser
}

windowrule {
    name = tag-firefox
    match:class = ([fF]irefox|zen|librewolf)

    tag = +firefox-based-browser
}

windowrule {
    name = chromium-props
    match:tag = chromium-based-browser

    tag = -default-opacity
    tile = on
    opacity = 1.0 0.97
}

windowrule {
    name = firefox-props
    match:tag = firefox-based-browser

    tag = -default-opacity
    opacity = 1.0 0.97
}

# Video apps: strip browser tag to avoid opacity
windowrule {
    name = browser-video-opaque
    match:class = (chrome-youtube.com__-Default|chrome-app.zoom.us__wc_home-Default)

    tag = -chromium-based-browser
    tag = -default-opacity
}

# --- Terminals ---
windowrule {
    name = tag-terminals
    match:class = (Alacritty|kitty|com.mitchellh.ghostty)

    tag = +terminal
}

windowrule {
    name = terminal-props
    match:tag = terminal

    tag = -default-opacity
    opacity = 0.97 0.9
}

# --- DaVinci Resolve ---
windowrule {
    name = davinci-resolve
    match:class = .*[Rr]esolve.*
    match:float = true

    stay_focused = on
}

# --- GeForce NOW ---
windowrule {
    name = geforce
    match:class = GeForceNOW

    idle_inhibit = fullscreen
}

# --- Hyprshot (no border artifact on screenshots) ---
layerrule = no_anim on, match:namespace selection

# --- JetBrains IDEs ---
windowrule {
    name = jetbrains-splash
    match:class = ^(jetbrains-.*)$
    match:title = ^(splash)$
    match:float = 1

    tag = +jetbrains-splash
    center = on
    no_focus = on
    border_size = 0
}

windowrule {
    name = jetbrains-popup
    match:class = ^(jetbrains-.*)
    match:title = ^(| )$
    match:float = 1

    tag = +jetbrains
    center = on
    stay_focused = on
    border_size = 0
    min_size = (monitor_w*0.5) (monitor_h*0.5)
}

windowrule {
    name = jetbrains-tooltip
    match:class = ^(jetbrains-.*)$
    match:title = ^(win.*)$
    match:float = 1

    no_initial_focus = on
}

windowrule {
    name = jetbrains-focus
    match:class = ^(jetbrains-.*)$

    no_follow_mouse = on
}

# --- LocalSend ---
windowrule {
    name = localsend
    match:class = (Share|localsend)

    float = on
    center = on
}

windowrule {
    name = localsend-size
    match:class = localsend

    size = 1100 700
}

# --- Moonlight ---
windowrule {
    name = moonlight
    match:class = com.moonlight_stream.Moonlight

    fullscreen = 1
    idle_inhibit = fullscreen
}

# --- Picture-in-Picture ---
windowrule {
    name = tag-pip
    match:title = (Picture.?in.?[Pp]icture)

    tag = +pip
}

windowrule {
    name = pip-props
    match:tag = pip

    tag = -default-opacity
    float = on
    pin = on
    size = 600 338
    keep_aspect_ratio = on
    border_size = 0
    opacity = 1 1
    move = (monitor_w-window_w-40) (monitor_h*0.04)
}

# --- QEMU ---
windowrule {
    name = qemu
    match:class = qemu

    tag = -default-opacity
    opacity = 1 1
}

# --- RetroArch ---
windowrule {
    name = retroarch
    match:class = com.libretro.RetroArch

    fullscreen = on
    tag = -default-opacity
    opacity = 1 1
    idle_inhibit = fullscreen
}

# --- Steam ---
windowrule {
    name = steam
    match:class = steam

    float = on
    idle_inhibit = fullscreen
}

windowrule {
    name = steam-opaque
    match:class = steam.*

    tag = -default-opacity
    opacity = 1 1
}

windowrule {
    name = steam-main-window
    match:class = steam
    match:title = Steam

    center = on
    size = 1100 700
}

windowrule {
    name = steam-friends
    match:class = steam
    match:title = Friends List

    size = 460 800
}

# --- Telegram ---
windowrule {
    name = telegram
    match:class = org.telegram.desktop

    focus_on_activate = off
}

# --- Walker launcher ---
layerrule = no_anim on, match:namespace walker

# --- Webcam overlay ---
windowrule {
    name = webcam-overlay
    match:title = WebcamOverlay

    float = on
    pin = on
    no_initial_focus = on
    no_dim = on
    move = (monitor_w-window_w-40) (monitor_h-window_h-40)
}


# =============================================================================
# KEYBINDINGS — MEDIA & BRIGHTNESS
# =============================================================================

$osdclient = swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')"

bindeld = ,XF86AudioRaiseVolume,  Volume up,              exec, $osdclient --output-volume raise
bindeld = ,XF86AudioLowerVolume,  Volume down,            exec, $osdclient --output-volume lower
bindeld = ,XF86AudioMute,         Mute,                   exec, $osdclient --output-volume mute-toggle
bindeld = ,XF86AudioMicMute,      Mute microphone,        exec, $osdclient --input-volume mute-toggle
bindeld = ,XF86MonBrightnessUp,   Brightness up,          exec, nomarchy-brightness-display +5%
bindeld = ,XF86MonBrightnessDown, Brightness down,        exec, nomarchy-brightness-display 5%-
bindeld = ,XF86KbdBrightnessUp,   Keyboard brightness up, exec, nomarchy-brightness-keyboard up
bindeld = ,XF86KbdBrightnessDown, Keyboard brightness down, exec, nomarchy-brightness-keyboard down
bindld  = ,XF86KbdLightOnOff,     Keyboard backlight cycle, exec, nomarchy-brightness-keyboard cycle

# Precise 1% adjustments with Alt modifier
bindeld = ALT,XF86AudioRaiseVolume,  Volume up precise,       exec, $osdclient --output-volume +1
bindeld = ALT,XF86AudioLowerVolume,  Volume down precise,     exec, $osdclient --output-volume -1
bindeld = ALT,XF86MonBrightnessUp,   Brightness up precise,   exec, nomarchy-brightness-display +1%
bindeld = ALT,XF86MonBrightnessDown, Brightness down precise, exec, nomarchy-brightness-display 1%-

# Media playback (requires playerctl)
bindld = ,XF86AudioNext,  Next track,    exec, $osdclient --playerctl next
bindld = ,XF86AudioPause, Pause,         exec, $osdclient --playerctl play-pause
bindld = ,XF86AudioPlay,  Play,          exec, $osdclient --playerctl play-pause
bindld = ,XF86AudioPrev,  Previous track,exec, $osdclient --playerctl previous

# Switch audio output with Super + Mute
bindld = SUPER,XF86AudioMute, Switch audio output, exec, nomarchy-cmd-audio-switch


# =============================================================================
# KEYBINDINGS — CLIPBOARD
# =============================================================================

bindd = SUPER,      C, Universal copy,      sendshortcut, CTRL,  Insert,
bindd = SUPER,      V, Universal paste,      sendshortcut, SHIFT, Insert,
bindd = SUPER,      X, Universal cut,        sendshortcut, CTRL,  X,
bindd = SUPER CTRL, V, Clipboard manager,    exec, nomarchy-launch-walker -m clipboard


# =============================================================================
# KEYBINDINGS — TILING & WORKSPACES
# =============================================================================

# Window management
bindd = SUPER,       W, Close window,                     killactive,
bindd = CTRL ALT,    DELETE, Close all windows,            exec, nomarchy-hyprland-window-close-all
bindd = SUPER,       J, Toggle window split,               layoutmsg, togglesplit
bindd = SUPER,       P, Pseudo window,                     pseudo,
bindd = SUPER,       T, Toggle floating/tiling,            togglefloating,
bindd = SUPER,       F, Full screen,                       fullscreen, 0
bindd = SUPER CTRL,  F, Tiled full screen,                 fullscreenstate, 0 2
bindd = SUPER ALT,   F, Full width,                        fullscreen, 1
bindd = SUPER,       O, Pop window out (float & pin),      exec, nomarchy-hyprland-window-pop
bindd = SUPER,       L, Toggle workspace layout,           exec, nomarchy-hyprland-workspace-layout-toggle

# Focus movement
bindd = SUPER, LEFT,  Move window focus left,  movefocus, l
bindd = SUPER, RIGHT, Move window focus right, movefocus, r
bindd = SUPER, UP,    Move window focus up,    movefocus, u
bindd = SUPER, DOWN,  Move window focus down,  movefocus, d

# Workspace switching (SUPER + 1-9, 0)
bindd = SUPER, code:10, Switch to workspace 1,  workspace, 1
bindd = SUPER, code:11, Switch to workspace 2,  workspace, 2
bindd = SUPER, code:12, Switch to workspace 3,  workspace, 3
bindd = SUPER, code:13, Switch to workspace 4,  workspace, 4
bindd = SUPER, code:14, Switch to workspace 5,  workspace, 5
bindd = SUPER, code:15, Switch to workspace 6,  workspace, 6
bindd = SUPER, code:16, Switch to workspace 7,  workspace, 7
bindd = SUPER, code:17, Switch to workspace 8,  workspace, 8
bindd = SUPER, code:18, Switch to workspace 9,  workspace, 9
bindd = SUPER, code:19, Switch to workspace 10, workspace, 10

# Move window to workspace (SUPER + SHIFT + 1-9, 0)
bindd = SUPER SHIFT, code:10, Move window to workspace 1,  movetoworkspace, 1
bindd = SUPER SHIFT, code:11, Move window to workspace 2,  movetoworkspace, 2
bindd = SUPER SHIFT, code:12, Move window to workspace 3,  movetoworkspace, 3
bindd = SUPER SHIFT, code:13, Move window to workspace 4,  movetoworkspace, 4
bindd = SUPER SHIFT, code:14, Move window to workspace 5,  movetoworkspace, 5
bindd = SUPER SHIFT, code:15, Move window to workspace 6,  movetoworkspace, 6
bindd = SUPER SHIFT, code:16, Move window to workspace 7,  movetoworkspace, 7
bindd = SUPER SHIFT, code:17, Move window to workspace 8,  movetoworkspace, 8
bindd = SUPER SHIFT, code:18, Move window to workspace 9,  movetoworkspace, 9
bindd = SUPER SHIFT, code:19, Move window to workspace 10, movetoworkspace, 10

# Move window silently to workspace (SUPER + SHIFT + ALT + 1-9, 0)
bindd = SUPER SHIFT ALT, code:10, Move window silently to workspace 1,  movetoworkspacesilent, 1
bindd = SUPER SHIFT ALT, code:11, Move window silently to workspace 2,  movetoworkspacesilent, 2
bindd = SUPER SHIFT ALT, code:12, Move window silently to workspace 3,  movetoworkspacesilent, 3
bindd = SUPER SHIFT ALT, code:13, Move window silently to workspace 4,  movetoworkspacesilent, 4
bindd = SUPER SHIFT ALT, code:14, Move window silently to workspace 5,  movetoworkspacesilent, 5
bindd = SUPER SHIFT ALT, code:15, Move window silently to workspace 6,  movetoworkspacesilent, 6
bindd = SUPER SHIFT ALT, code:16, Move window silently to workspace 7,  movetoworkspacesilent, 7
bindd = SUPER SHIFT ALT, code:17, Move window silently to workspace 8,  movetoworkspacesilent, 8
bindd = SUPER SHIFT ALT, code:18, Move window silently to workspace 9,  movetoworkspacesilent, 9
bindd = SUPER SHIFT ALT, code:19, Move window silently to workspace 10, movetoworkspacesilent, 10

# Scratchpad
bindd = SUPER,     S, Toggle scratchpad,         togglespecialworkspace, scratchpad
bindd = SUPER ALT, S, Move window to scratchpad, movetoworkspacesilent, special:scratchpad

# Workspace tab navigation
bindd = SUPER,      TAB,  Next workspace,   workspace, e+1
bindd = SUPER SHIFT,TAB,  Previous workspace, workspace, e-1
bindd = SUPER CTRL, TAB,  Former workspace, workspace, previous

# Move workspaces between monitors
bindd = SUPER SHIFT ALT, LEFT,  Move workspace to left monitor,  movecurrentworkspacetomonitor, l
bindd = SUPER SHIFT ALT, RIGHT, Move workspace to right monitor, movecurrentworkspacetomonitor, r
bindd = SUPER SHIFT ALT, UP,    Move workspace to upper monitor, movecurrentworkspacetomonitor, u
bindd = SUPER SHIFT ALT, DOWN,  Move workspace to lower monitor, movecurrentworkspacetomonitor, d

# Swap windows with arrow keys
bindd = SUPER SHIFT, LEFT,  Swap window left,  swapwindow, l
bindd = SUPER SHIFT, RIGHT, Swap window right, swapwindow, r
bindd = SUPER SHIFT, UP,    Swap window up,    swapwindow, u
bindd = SUPER SHIFT, DOWN,  Swap window down,  swapwindow, d

# Cycle windows on active workspace
bindd = ALT,       TAB, Cycle to next window,          cyclenext
bindd = ALT SHIFT, TAB, Cycle to prev window,          cyclenext, prev
bindd = ALT,       TAB, Reveal active window on top,   bringactivetotop
bindd = ALT SHIFT, TAB, Reveal active window on top,   bringactivetotop

# Resize active window
bindd = SUPER,       code:20, Expand window left,  resizeactive, -100 0   # - key
bindd = SUPER,       code:21, Shrink window left,  resizeactive, 100 0    # = key
bindd = SUPER SHIFT, code:20, Shrink window up,    resizeactive, 0 -100
bindd = SUPER SHIFT, code:21, Expand window down,  resizeactive, 0 100

# Scroll through workspaces with SUPER + scroll
bindd = SUPER, mouse_down, Scroll workspace forward,  workspace, e+1
bindd = SUPER, mouse_up,   Scroll workspace backward, workspace, e-1

# Move/resize with mouse
bindmd = SUPER, mouse:272, Move window,   movewindow
bindmd = SUPER, mouse:273, Resize window, resizewindow

# Window groups
bindd = SUPER,     G, Toggle window grouping,           togglegroup
bindd = SUPER ALT, G, Move active window out of group,  moveoutofgroup

# Move into groups
bindd = SUPER ALT, LEFT,  Move window to group on left,   moveintogroup, l
bindd = SUPER ALT, RIGHT, Move window to group on right,  moveintogroup, r
bindd = SUPER ALT, UP,    Move window to group on top,    moveintogroup, u
bindd = SUPER ALT, DOWN,  Move window to group on bottom, moveintogroup, d

# Navigate grouped windows
bindd = SUPER ALT,       TAB, Next window in group,      changegroupactive, f
bindd = SUPER ALT SHIFT, TAB, Previous window in group,  changegroupactive, b
bindd = SUPER CTRL,      LEFT,  Move grouped window focus left,  changegroupactive, b
bindd = SUPER CTRL,      RIGHT, Move grouped window focus right, changegroupactive, f

# Scroll through grouped windows
bindd = SUPER ALT, mouse_down, Next window in group,     changegroupactive, f
bindd = SUPER ALT, mouse_up,   Previous window in group, changegroupactive, b

# Activate group window by number
bindd = SUPER ALT, code:10, Switch to group window 1, changegroupactive, 1
bindd = SUPER ALT, code:11, Switch to group window 2, changegroupactive, 2
bindd = SUPER ALT, code:12, Switch to group window 3, changegroupactive, 3
bindd = SUPER ALT, code:13, Switch to group window 4, changegroupactive, 4
bindd = SUPER ALT, code:14, Switch to group window 5, changegroupactive, 5

# Cycle monitor scaling
bindd = SUPER, Slash, Cycle monitor scaling, exec, nomarchy-hyprland-monitor-scaling-cycle


# =============================================================================
# KEYBINDINGS — UTILITIES & SYSTEM
# =============================================================================

# Menus & launchers
bindd = SUPER,          SPACE,   Launch apps,        exec, nomarchy-launch-walker
bindd = SUPER CTRL,     E,       Emoji picker,        exec, nomarchy-launch-walker -m symbols
bindd = SUPER CTRL,     C,       Capture menu,        exec, nomarchy-menu capture
bindd = SUPER CTRL,     O,       Toggle menu,         exec, nomarchy-menu toggle
bindd = SUPER ALT,      SPACE,   Nomarchy menu,       exec, nomarchy-menu
bindd = SUPER,          ESCAPE,  System menu,         exec, nomarchy-menu system
bindld = ,XF86PowerOff, Power menu,                  exec, nomarchy-menu system
bindd = SUPER,          K,       Show key bindings,   exec, nomarchy-menu-keybindings
bindd = ,XF86Calculator,         Calculator,          exec, gnome-calculator

# Aesthetics
bindd = SUPER SHIFT,      SPACE,     Toggle top bar,               exec, nomarchy-toggle-waybar
bindd = SUPER CTRL,       SPACE,     Theme background menu,        exec, nomarchy-menu background
bindd = SUPER SHIFT CTRL, SPACE,     Theme menu,                   exec, nomarchy-menu theme
bindd = SUPER,            BACKSPACE, Toggle window transparency,    exec, hyprctl dispatch setprop "address:$(hyprctl activewindow -j | jq -r '.address')" opaque toggle
bindd = SUPER SHIFT,      BACKSPACE, Toggle window gaps,            exec, nomarchy-hyprland-window-gaps-toggle
bindd = SUPER CTRL,       BACKSPACE, Toggle single-window square aspect, exec, nomarchy-hyprland-window-single-square-aspect-toggle

# Notifications
bindd = SUPER,          COMMA, Dismiss last notification,       exec, makoctl dismiss
bindd = SUPER SHIFT,    COMMA, Dismiss all notifications,       exec, makoctl dismiss --all
bindd = SUPER CTRL,     COMMA, Toggle silencing notifications,  exec, nomarchy-toggle-notification-silencing
bindd = SUPER ALT,      COMMA, Invoke last notification,        exec, makoctl invoke
bindd = SUPER SHIFT ALT,COMMA, Restore last notification,       exec, makoctl restore

# Toggles
bindd = SUPER CTRL, I, Toggle locking on idle, exec, nomarchy-toggle-idle
bindd = SUPER CTRL, N, Toggle nightlight,       exec, nomarchy-toggle-nightlight

# Captures
bindd = ,          PRINT, Screenshot,       exec, nomarchy-cmd-screenshot
bindd = ALT,       PRINT, Screenrecording,  exec, nomarchy-menu screenrecord
bindd = SUPER,     PRINT, Color picker,     exec, pkill hyprpicker || hyprpicker -a

# File sharing
bind = SUPER CTRL, S, exec, nomarchy-menu share

# Waybar-less info
bind = SUPER CTRL ALT, T, exec, notify-send "    $(date +"%A %H:%M  —  %d %B W%V %Y")"
bind = SUPER CTRL ALT, B, exec, notify-send "$(nomarchy-battery-status)"

# Control panels
bind = SUPER CTRL, A, exec, nomarchy-launch-audio
bind = SUPER CTRL, B, exec, nomarchy-launch-bluetooth
bind = SUPER CTRL, W, exec, nomarchy-launch-wifi
bind = SUPER CTRL, T, exec, nomarchy-launch-tui btop

# Dictation
bind = SUPER CTRL, X, exec, voxtype record toggle

# Zoom
bind = SUPER CTRL, Z, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float + 1')
bind = SUPER CTRL ALT, Z, exec, hyprctl keyword cursor:zoom_factor 1

# Lock
bind = SUPER CTRL, L, exec, nomarchy-lock-screen


# =============================================================================
# KEYBINDINGS — APPLICATIONS
# Edit this section to customize your application shortcuts.
# =============================================================================

# Terminals
bind = SUPER, RETURN, exec, uwsm-app -- xdg-terminal-exec --dir="$(nomarchy-cmd-terminal-cwd)"
bind = SUPER ALT, RETURN, exec, uwsm-app -- xdg-terminal-exec --dir="$(nomarchy-cmd-terminal-cwd)" bash -c "tmux attach || tmux new -s Work"

# Apps
bind = SUPER SHIFT, RETURN, exec, nomarchy-launch-browser
bind = SUPER SHIFT, F, exec, uwsm-app -- nautilus --new-window
bind = SUPER ALT SHIFT, F, exec, uwsm-app -- nautilus --new-window "$(nomarchy-cmd-terminal-cwd)"
bind = SUPER SHIFT, B, exec, nomarchy-launch-browser
bind = SUPER SHIFT ALT, B, exec, nomarchy-launch-browser --private
bind = SUPER SHIFT, M, exec, nomarchy-launch-or-focus spotify
bind = SUPER SHIFT, N, exec, nomarchy-launch-editor
bind = SUPER SHIFT, D, exec, nomarchy-launch-tui lazydocker
bind = SUPER SHIFT, G, exec, nomarchy-launch-or-focus ^signal$ "uwsm-app -- signal-desktop"
bind = SUPER SHIFT, O, exec, nomarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
bind = SUPER SHIFT, W, exec, uwsm-app -- typora --enable-wayland-ime
bind = SUPER SHIFT, SLASH, exec, uwsm-app -- 1password

# Web apps (if url contains #, type it as ## to prevent hyprland treating it as a comment)
bind = SUPER SHIFT, A, exec, nomarchy-launch-webapp "https://chatgpt.com"
bind = SUPER SHIFT ALT, A, exec, nomarchy-launch-webapp "https://grok.com"
bind = SUPER SHIFT, C, exec, nomarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
bind = SUPER SHIFT, E, exec, nomarchy-launch-webapp "https://app.hey.com"
bind = SUPER SHIFT, Y, exec, nomarchy-launch-webapp "https://youtube.com/"
bind = SUPER SHIFT ALT, X, exec, nomarchy-launch-webapp "https://x.com/compose/post"
bind = SUPER SHIFT, X, exec, nomarchy-launch-webapp "https://x.com/"
bind = SUPER SHIFT ALT, G, exec, nomarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bind = SUPER SHIFT CTRL, G, exec, nomarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bind = SUPER SHIFT, P, exec, nomarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
bindd = SUPER SHIFT,      X, X,              exec, nomarchy-launch-webapp "https://x.com/"
bindd = SUPER SHIFT ALT,  X, X Post,         exec, nomarchy-launch-webapp "https://x.com/compose/post"

# Add your own bindings below:
# bindd = SUPER SHIFT, R, exec, alacritty -e ssh your-server


# =============================================================================
# XDG DESKTOP PORTAL (screen sharing)
# =============================================================================

screencopy {
    allow_token_by_default = true
    custom_picker_binary   = hyprland-preview-share-picker
}
