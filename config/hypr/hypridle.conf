general {
    lock_cmd         = nomarchy-lock-screen                         # lock screen
    before_sleep_cmd = loginctl lock-session                        # lock before suspend
    after_sleep_cmd  = sleep 1 && hyprctl dispatch dpms on          # turn display on after wake
    inhibit_sleep    = 3                                            # wait until screen is locked
}

listener {
    timeout  = 150                                                          # 2.5 min
    on-timeout = pidof hyprlock || nomarchy-launch-screensaver             # start screensaver (if not already locked)
}

listener {
    timeout    = 300                                                        # 5 min
    on-timeout = loginctl lock-session                                      # lock screen
}

listener {
    timeout    = 330                                                        # 5.5 min
    on-timeout = brightnessctl -sd '*::kbd_backlight' set 0                # turn off keyboard backlight
    on-resume  = brightnessctl -rd '*::kbd_backlight'                      # restore keyboard backlight
}

listener {
    timeout    = 330                                                        # 5.5 min
    on-timeout = hyprctl dispatch dpms off                                  # turn off display
    on-resume  = hyprctl dispatch dpms on && brightnessctl -r              # turn on display
}
